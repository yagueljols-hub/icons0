<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yaguel John Louie - Icon Name Design</title>

<!-- FontAwesome CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-m+6XG1F6+2DnE1uF6tSx/Bi87uRclZV7yYlq1Tt0Vv4+2qJHoG3A2mZB0lJqGJ9ZY/eAQr+3f3pQ4U1eP60Rag==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
body {
    font-family: 'Arial', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
    flex-wrap: wrap;
    gap: 20px;
}

/* Letter container */
.icon-letter {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 80px;
    height: 100px;
    border-radius: 15px;
    background: rgba(255,255,255,0.2);
    color: #fff;
    font-size: 40px;
    transition: all 0.3s ease;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.icon-letter span {
    margin-top: 5px;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
}

/* Hover effect */
.icon-letter:hover {
    transform: translateY(-10px) scale(1.2) rotate(10deg);
    background: rgba(255,255,255,0.4);
    color: #fffa65;
}
</style>
</head>
<body>

<!-- Yaguel John Louie letters -->
<div class="icon-letter"><i class="fa-solid fa-yin-yang"></i><span>Y</span></div>
<div class="icon-letter"><i class="fa-solid fa-apple-whole"></i><span>A</span></div>
<div class="icon-letter"><i class="fa-solid fa-gem"></i><span>G</span></div>
<div class="icon-letter"><i class="fa-solid fa-umbrella"></i><span>U</span></div>
<div class="icon-letter"><i class="fa-solid fa-envelope"></i><span>E</span></div>
<div class="icon-letter"><i class="fa-solid fa-leaf"></i><span>L</span></div>

<div class="icon-letter"><i class="fa-solid fa-jedi"></i><span>J</span></div>
<div class="icon-letter"><i class="fa-solid fa-otter"></i><span>O</span></div>
<div class="icon-letter"><i class="fa-solid fa-hammer"></i><span>H</span></div>
<div class="icon-letter"><i class="fa-solid fa-nut"></i><span>N</span></div>

<div class="icon-letter"><i class="fa-solid fa-lemon"></i><span>L</span></div>
<div class="icon-letter"><i class="fa-solid fa-otter"></i><span>O</span></div>
<div class="icon-letter"><i class="fa-solid fa-umbrella"></i><span>U</span></div>
<div class="icon-letter"><i class="fa-solid fa-ice-cream"></i><span>I</span></div>
<div class="icon-letter"><i class="fa-solid fa-envelope"></i><span>E</span></div>

</body>
</html>
